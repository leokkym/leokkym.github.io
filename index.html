<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<title>原神OST台帳</title>
<style>
  :root {
    --paper: #f2ede2;
    --paper-dim: #e9e2d2;
    --ink: #2b2a25;
    --ink-soft: #6b6455;
    --line: #cfc6ac;
    --accent: #2f5d54;
    --accent-soft: #cfe0da;
    --gold: #b5893a;
    --danger: #a8432f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }

  header.masthead {
    border-bottom: 3px double var(--ink);
    padding-bottom: 14px;
    margin-bottom: 22px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  header.masthead .title {
    font-family: inherit;
    font-size: 28px;
    letter-spacing: 0.02em;
    font-weight: 800;
  }
  header.masthead .subtitle {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  section.panel {
    background: var(--paper-dim);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  section.panel h2 {
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    margin: 0 0 12px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  section.panel h2::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
  }

  label.field { display: block; font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; }
  input[type=text], input[type=number] {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: #fffdf8;
    color: var(--ink);
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .row > div { flex: 1; min-width: 180px; }

  button {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 2px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { opacity: 0.9; }
  button.ghost { background: transparent; color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .meta-line { font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; }

  .album-checklist {
    max-height: 160px;
    overflow-y: auto;
    border: 1px solid var(--line);
    background: #fffdf8;
    border-radius: 2px;
    padding: 6px 10px;
  }
  .album-checklist label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 3px 0;
    cursor: pointer;
  }
  .album-checklist input { width: auto; }

  table.rank { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.rank th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--line);
    padding: 6px 8px;
  }
  table.rank td {
    padding: 8px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  table.rank tr:hover td { background: var(--accent-soft); }
  td.rank-num { font-family: inherit; font-weight: 800; color: var(--gold); width: 40px; }
  td.title-cell { font-weight: 600; }
  td.album-cell { color: var(--ink-soft); font-size: 12px; }
  td.views-cell { text-align: right; font-variant-numeric: tabular-nums; }
  td.play-cell { text-align: center; width: 50px; }
  .play-btn {
    background: none; border: none; color: var(--accent); font-size: 16px; padding: 2px 6px; cursor: pointer;
  }

  .search-result {
    border: 1px solid var(--gold);
    background: #fbf4e2;
    border-radius: 3px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .search-result .big { font-size: 22px; font-family: inherit; font-weight: 800; color: var(--gold); }

  .player-box {
    position: fixed;
    right: 16px;
    bottom: 16px;
    width: 260px;
    background: var(--ink);
    color: var(--paper);
    padding: 8px 10px;
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    display: none;
    z-index: 100;
  }
  .player-box.active { display: block; }
  .player-box #ytPlayerFrame { width: 100%; height: 146px; border: none; border-radius: 3px; display: block; background: #000; }
  .player-box .now {
    font-size: 11px;
    opacity: 0.8;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-box .close-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.45);
    border: none;
    border-radius: 50%;
    color: var(--paper);
    opacity: 0.85;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    z-index: 20;
  }
  .player-box .close-btn:hover { opacity: 1; }

  .empty-state { font-size: 13px; color: var(--ink-soft); padding: 20px 0; text-align: center; }
  .status { font-size: 12px; margin-top: 8px; color: var(--ink-soft); }
  .status.err { color: var(--danger); }
  .status.ok { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div>
      <div class="title">原神OST台帳</div>
      <div class="subtitle">Genshin Impact OST Ledger</div>
    </div>
  </header>

  <div id="loadLog" class="status err" style="display:none; margin-bottom:16px;"></div>

  <section class="panel" id="searchPanel" style="display:none;">
    <h2>楽曲検索（中間一致）</h2>
    <div class="row">
      <div>
        <label class="field">楽曲名で検索</label>
        <input type="text" id="searchInput" placeholder="例: 風を捕まえる異邦人" />
      </div>
      <div>
        <label class="field">アルバム名で検索</label>
        <input type="text" id="albumSearchInput" placeholder="例: 風と異邦人" />
      </div>
    </div>
    <div id="searchResult" style="margin-top:10px;"></div>
  </section>

  <section class="panel" id="rankPanel" style="display:none;">
    <h2 id="rankPanelTitle">再生数ランキング</h2>
    <div class="row">
      <div>
        <label class="field">アルバムで絞り込み(複数選択可)</label>
        <div class="album-checklist" id="albumCheckList"></div>
      </div>
      <div>
        <label class="field">再生回数 ○回以上</label>
        <input type="number" id="minViewsInput" min="0" step="1000" placeholder="指定なし" />
      </div>
      <div>
        <label class="field">上位 ○曲まで表示</label>
        <input type="number" id="topNInput" min="1" step="1" placeholder="指定なし" />
      </div>
      <div style="flex: 0 0 auto; align-self:flex-end;">
        <button id="resetFilterBtn" class="ghost">リセット</button>
      </div>
    </div>
    <div class="meta-line" id="rankMeta" style="margin-top:12px;"></div>
    <table class="rank">
      <thead>
        <tr>
          <th>#</th><th>再生</th><th>曲名</th><th>アルバム</th><th style="text-align:right;">再生回数</th>
        </tr>
      </thead>
      <tbody id="rankBody"></tbody>
    </table>

    <div id="emptyState" class="empty-state" style="display:none;">該当する楽曲がありません。</div>
  </section>

  <div class="player-box" id="playerBox">
    <button class="close-btn" id="closePlayerBtn" title="閉じる">✕</button>
    <div class="now" id="nowPlayingLabel"></div>
    <iframe id="ytPlayerFrame" src="" allow="autoplay; encrypted-media" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  </div>

</div>

<script>
(function () {
  let tracks = [];         // [{videoId, title, album, releaseYear, viewCount, fetchedAt}]
  let rankedList = [];     // tracksをviewCount降順に並べ、rank/percentileを付与したもの

  const $ = (id) => document.getElementById(id);

  function showLoadError(msg) {
    const el = $("loadLog");
    el.textContent = msg;
    el.style.display = msg ? "inline" : "none";
  }

  async function loadTracks() {
    try {
      const res = await fetch("./genshin_tracks.json", { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error("配列形式ではありません。");
      tracks = data;
      return true;
    } catch (e) {
      showLoadError("読込エラー: " + e.message);
      return false;
    }
  }

  async function initAll() {
    showLoadError("");
    tracks = [];
    const ok = await loadTracks();
    if (ok && tracks.length > 0) {
      buildRanking();
    }
  }

  // ---- 検索文字列の正規化(大文字・小文字/全角・半角を区別しない) ----
  function normalizeForSearch(s) {
    if (!s) return "";
    // 全角英数字・記号 -> 半角
    let result = s.replace(/[\uFF01-\uFF5E]/g, ch =>
      String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
    );
    // 全角スペース -> 半角スペース
    result = result.replace(/\u3000/g, " ");
    return result.toLowerCase().trim();
  }

  // ---- アルバム名の表示整形 ----
  // 例: 「原神-輝く星々Vol. 5 (キャラクターテーマOriginal Soundtrack)」
  //     -> 「輝く星々Vol. 5」
  function formatAlbumName(album) {
    if (!album) return "";
    let s = album;
    // 先頭の「原神-」「原神 - 」(半角/全角スペースの有無を問わない)を削除
    s = s.replace(/^原神\s*-\s*/, "");
    // "Original ... Soundtrack" を含む括弧書きを括弧ごと削除(全角/半角括弧の両方に対応)
    s = s.replace(/[\(（][^)\)（）]*Original[^)\)（）]*Soundtrack[^)\)（）]*[\)）]/gi, "");
    s = s.trim();
    // Vol表記のゆれ(Vol 2 / Vol2 / Vol.2 、コンマの有無)を「タイトルVol.N」に統一
    const volMatch = s.match(/^(.*?)[,、]?\s*Vol\.?\s*(\d+)\s*$/i);
    if (volMatch) {
      const title = volMatch[1].trim().replace(/[,、]$/, "");
      s = `${title}Vol.${volMatch[2]}`;
    }
    return s.trim();
  }

  function formatDateJP(isoString) {
    const d = new Date(isoString);
    if (isNaN(d.getTime())) return null;
    return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
  }

  function buildRanking() {
    if (tracks.length === 0) return;

    const sorted = tracks.slice().sort((a, b) => (b.viewCount || 0) - (a.viewCount || 0));
    const total = sorted.length;
    rankedList = sorted.map((t, idx) => ({
      ...t,
      viewCount: t.viewCount || 0,
      rank: idx + 1,
      percentile: total > 0 ? ((idx + 1) / total) * 100 : 100,
    }));

    const createdAt = formatDateJP(tracks[0] && tracks[0].fetchedAt);
    $("rankPanelTitle").textContent = createdAt
      ? `再生数ランキング（${createdAt}時点）`
      : "再生数ランキング";

    $("searchPanel").style.display = "block";
    $("rankPanel").style.display = "block";

    renderAlbumCheckList();
    renderRankTable();
  }

  function renderAlbumCheckList() {
    const albums = Array.from(new Set(rankedList.map(t => t.album || "(不明)")));
    albums.sort((a, b) => formatAlbumName(a).localeCompare(formatAlbumName(b), "ja"));
    const container = $("albumCheckList");
    container.innerHTML = albums.map(album => `
      <label>
        <input type="checkbox" class="album-checkbox" value="${escapeHtml(album)}" />
        <span>${escapeHtml(formatAlbumName(album))}</span>
      </label>
    `).join("");
    container.querySelectorAll(".album-checkbox").forEach(cb => {
      cb.addEventListener("change", renderRankTable);
    });
  }

  function getSelectedAlbums() {
    return Array.from(document.querySelectorAll(".album-checkbox:checked")).map(cb => cb.value);
  }

  function renderRankTable() {
    const selectedAlbums = getSelectedAlbums();
    const minViewsRaw = $("minViewsInput").value;
    const topNRaw = $("topNInput").value;
    const minViews = minViewsRaw === "" ? null : parseInt(minViewsRaw, 10);
    const topN = topNRaw === "" ? null : parseInt(topNRaw, 10);

    let filtered = rankedList.filter(t => {
      const albumOk = selectedAlbums.length === 0 || selectedAlbums.includes(t.album || "(不明)");
      const viewsOk = minViews === null || isNaN(minViews) || t.viewCount >= minViews;
      return albumOk && viewsOk;
    });

    if (topN !== null && !isNaN(topN) && topN > 0) {
      filtered = filtered.slice(0, topN);
    }

    $("rankMeta").textContent = `全 ${rankedList.length} 曲中、条件に合致する ${filtered.length} 曲を表示しています。`;

    const tbody = $("rankBody");
    tbody.innerHTML = "";

    if (filtered.length === 0) {
      $("emptyState").style.display = "block";
      return;
    }
    $("emptyState").style.display = "none";

    for (const t of filtered) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank-num">${t.rank}</td>
        <td class="play-cell"><button class="play-btn" data-video="${t.videoId}" data-title="${escapeHtml(t.title)}">▶</button></td>
        <td class="title-cell">${escapeHtml(t.title)}</td>
        <td class="album-cell">${escapeHtml(formatAlbumName(t.album))}</td>
        <td class="views-cell">${t.viewCount.toLocaleString()}</td>
      `;
      tbody.appendChild(tr);
    }

    tbody.querySelectorAll(".play-btn").forEach(btn => {
      btn.addEventListener("click", () => playTrack(btn.dataset.video, btn.dataset.title));
    });
  }

  $("minViewsInput").addEventListener("input", renderRankTable);
  $("topNInput").addEventListener("input", renderRankTable);

  $("resetFilterBtn").addEventListener("click", () => {
    document.querySelectorAll(".album-checkbox:checked").forEach(cb => { cb.checked = false; });
    $("minViewsInput").value = "";
    $("topNInput").value = "";
    renderRankTable();
  });

  // ---- 楽曲検索(曲名 AND アルバム名、複数候補は全件表示) ----
  function updateSearchResults() {
    const qSong = normalizeForSearch($("searchInput").value);
    const qAlbum = normalizeForSearch($("albumSearchInput").value);
    const resultBox = $("searchResult");

    if (!qSong && !qAlbum) { resultBox.innerHTML = ""; return; }

    const hits = rankedList.filter(t => {
      const titleOk = !qSong || normalizeForSearch(t.title).includes(qSong);
      const albumOk = !qAlbum || normalizeForSearch(formatAlbumName(t.album)).includes(qAlbum);
      return titleOk && albumOk;
    });

    if (hits.length === 0) {
      resultBox.innerHTML = `<div class="search-result">一致する楽曲が見つかりませんでした。</div>`;
      return;
    }

    resultBox.innerHTML = hits.map((hit, i) => `
      <div class="search-result" style="margin-top:${i === 0 ? "0" : "8px"};">
        <div style="display:flex; align-items:center; gap:8px;">
          <button class="play-btn search-play-btn" data-video="${hit.videoId}" data-title="${escapeHtml(hit.title)}" style="font-size:20px;">▶</button>
          <strong>${escapeHtml(hit.title)}</strong>（${escapeHtml(formatAlbumName(hit.album))}）
        </div>
        <div class="big">${hit.rank}位</div>
        <div>全 ${rankedList.length} 曲中 ・ 上位 ${hit.percentile.toFixed(1)}% ・ 再生回数 ${hit.viewCount.toLocaleString()}</div>
      </div>
    `).join("");

    resultBox.querySelectorAll(".search-play-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        playTrack(e.currentTarget.dataset.video, e.currentTarget.dataset.title);
      });
    });
  }

  $("searchInput").addEventListener("input", updateSearchResults);
  $("albumSearchInput").addEventListener("input", updateSearchResults);

  // ---- 再生(シンプル版: クリックした曲をそのままiframeに読み込むだけ) ----
  function playTrack(videoId, title) {
    $("playerBox").classList.add("active");
    $("nowPlayingLabel").textContent = "再生中: " + title;
    $("ytPlayerFrame").src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0`;
  }

  $("closePlayerBtn").addEventListener("click", () => {
    $("playerBox").classList.remove("active");
    $("ytPlayerFrame").src = ""; // 再生を確実に停止する
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  initAll();
})();
</script>
</body>
</html>
