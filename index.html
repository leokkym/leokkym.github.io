<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<title>原神OST台帳</title>
<style>
  :root {
    --paper: #f2ede2;
    --paper-dim: #e9e2d2;
    --ink: #2b2a25;
    --ink-soft: #6b6455;
    --line: #cfc6ac;
    --accent: #2f5d54;
    --accent-soft: #cfe0da;
    --gold: #b5893a;
    --danger: #a8432f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }

  header.masthead {
    border-bottom: 3px double var(--ink);
    padding-bottom: 14px;
    margin-bottom: 22px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  header.masthead .title {
    font-family: inherit;
    font-size: 28px;
    letter-spacing: 0.02em;
    font-weight: 800;
  }
  header.masthead .subtitle {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  section.panel {
    background: var(--paper-dim);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  section.panel h2 {
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    margin: 0 0 12px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  section.panel h2::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
  }

  label.field { display: block; font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; }
  input[type=text], input[type=number] {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: #fffdf8;
    color: var(--ink);
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .row > div { flex: 1; min-width: 180px; }

  button {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 2px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { opacity: 0.9; }
  button.ghost { background: transparent; color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .meta-line { font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; }

  .album-checklist {
    max-height: 160px;
    overflow-y: auto;
    border: 1px solid var(--line);
    background: #fffdf8;
    border-radius: 2px;
    padding: 6px 10px;
  }
  .album-checklist label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 3px 0;
    cursor: pointer;
  }
  .album-checklist input { width: auto; }

  table.rank { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.rank th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--line);
    padding: 6px 8px;
  }
  table.rank td {
    padding: 8px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  table.rank tr:hover td { background: var(--accent-soft); }
  td.rank-num { font-family: inherit; font-weight: 800; color: var(--gold); width: 40px; }
  td.title-cell { font-weight: 600; }
  td.album-cell { color: var(--ink-soft); font-size: 12px; }
  td.views-cell { text-align: right; font-variant-numeric: tabular-nums; }
  td.play-cell { text-align: center; width: 50px; }
  .play-btn {
    background: none; border: none; color: var(--accent); font-size: 16px; padding: 2px 6px; cursor: pointer;
  }
  .play-btn.playing { color: var(--gold); }
  tr.now-playing-row td { background: var(--accent-soft); }
  tr.now-playing-row td.rank-num { box-shadow: inset 3px 0 0 var(--gold); }
  .search-result.now-playing-row {
    box-shadow: inset 3px 0 0 var(--gold);
  }

  .search-result {
    border: 1px solid var(--gold);
    background: #fbf4e2;
    border-radius: 3px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .search-result .big { font-size: 22px; font-family: inherit; font-weight: 800; color: var(--gold); }

  .player-box {
    position: fixed;
    right: 16px;
    bottom: 16px;
    width: 300px;
    max-width: calc(100vw - 24px);
    background: var(--ink);
    color: var(--paper);
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    display: none;
    z-index: 100;
  }
  .player-box.active { display: block; }

  .seek-bar {
    display: block;
    width: 100%;
    height: 4px;
    margin: 0;
    padding: 0;
    cursor: pointer;
    accent-color: var(--gold);
    background: rgba(255,255,255,0.15);
    -webkit-appearance: none;
    appearance: none;
    border-radius: 0;
  }
  .seek-bar::-webkit-slider-runnable-track {
    height: 4px;
    background: rgba(255,255,255,0.15);
  }
  .seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px;
    height: 10px;
    margin-top: -3px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
  }
  .seek-bar::-moz-range-track {
    height: 4px;
    background: rgba(255,255,255,0.15);
  }
  .seek-bar::-moz-range-thumb {
    width: 10px;
    height: 10px;
    border: none;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
  }


  .player-inner {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px;
  }

  .player-box #ytPlayerHost {
    width: 56px;
    height: 56px;
    flex: 0 0 auto;
    border-radius: 6px;
    overflow: hidden;
    background: #000;
  }

  .player-info { flex: 1; min-width: 0; padding-top: 2px; }

  .player-box .now {
    font-size: 11px;
    opacity: 0.85;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-box .close-btn {
    flex: 0 0 auto;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 50%;
    color: var(--paper);
    opacity: 0.75;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
  }
  .player-box .close-btn:hover { opacity: 1; }

  .player-controls {
    display: flex;
    gap: 4px;
    margin-top: 0;
  }
  .ctrl-btn {
    flex: 1;
    min-width: 0;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--paper);
    font-size: 13px;
    padding: 4px 2px;
    border-radius: 4px;
    cursor: pointer;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.16); }
  .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .ctrl-btn.on {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
    font-weight: 600;
  }

  /* スマホ幅では画面下部に幅いっぱいで固定し、圧迫感を減らす */
  @media (max-width: 600px) {
    .player-box {
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-width: 100%;
      border-radius: 0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.35);
    }
  }

  .empty-state { font-size: 13px; color: var(--ink-soft); padding: 20px 0; text-align: center; }
  .status { font-size: 12px; margin-top: 8px; color: var(--ink-soft); }
  .status.err { color: var(--danger); }
  .status.ok { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div>
      <div class="title">原神OST台帳</div>
      <div class="subtitle">Genshin Impact OST Ledger</div>
    </div>
  </header>

  <div id="loadLog" class="status err" style="display:none; margin-bottom:16px;"></div>

  <section class="panel" id="searchPanel" style="display:none;">
    <h2>楽曲検索（中間一致）</h2>
    <div class="row">
      <div>
        <label class="field">楽曲名で検索</label>
        <input type="text" id="searchInput" placeholder="例: 風を捕まえる異邦人" />
      </div>
      <div>
        <label class="field">アルバム名で検索</label>
        <input type="text" id="albumSearchInput" placeholder="例: 風と異邦人" />
      </div>
    </div>
    <div id="searchResult" style="margin-top:10px;"></div>
  </section>

  <section class="panel" id="rankPanel" style="display:none;">
    <h2 id="rankPanelTitle">再生数ランキング</h2>
    <div class="row">
      <div>
        <label class="field">アルバムで絞り込み（複数選択可）</label>
        <div class="album-checklist" id="albumCheckList"></div>
      </div>
      <div>
        <label class="field">再生回数 ○回以上</label>
        <input type="number" id="minViewsInput" min="0" step="1000" placeholder="指定なし" />
      </div>
      <div>
        <label class="field">上位 ○曲まで表示</label>
        <input type="number" id="topNInput" min="1" step="1" value="20" />
      </div>
      <div style="flex: 0 0 auto; align-self:flex-end;">
        <button id="resetFilterBtn" class="ghost">リセット</button>
      </div>
    </div>
    <div class="meta-line" id="rankMeta" style="margin-top:12px;"></div>
    <table class="rank">
      <thead>
        <tr>
          <th>#</th><th>再生</th><th>曲名</th><th>アルバム</th><th style="text-align:right;">再生回数</th>
        </tr>
      </thead>
      <tbody id="rankBody"></tbody>
    </table>

    <div id="emptyState" class="empty-state" style="display:none;">該当する楽曲がありません。</div>
  </section>

  <div class="player-box" id="playerBox">
    <input type="range" id="seekBar" class="seek-bar" min="0" max="100" value="0" step="0.1" />
    <div class="player-inner">
      <div id="ytPlayerHost"><div id="ytPlayerMount"></div></div>
      <div class="player-info">
        <div class="now" id="nowPlayingLabel"></div>
        <div class="player-controls">
          <button id="prevBtn" class="ctrl-btn" title="前の曲へ">⏮</button>
          <button id="shuffleBtn" class="ctrl-btn" title="シャッフル">⇄</button>
          <button id="repeatBtn" class="ctrl-btn" title="リピート: オフ">↻</button>
          <button id="nextBtn" class="ctrl-btn" title="次の曲へ">⏭</button>
        </div>
      </div>
      <button class="close-btn" id="closePlayerBtn" title="閉じる">✕</button>
    </div>
  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
(function () {
  let tracks = [];         // [{videoId, title, album, releaseYear, viewCount, fetchedAt}]
  let rankedList = [];     // tracksをviewCount降順に並べ、rank/percentileを付与したもの
  let currentVisible = []; // 現在テーブルに表示中(絞り込み後)のトラック一覧

  const $ = (id) => document.getElementById(id);

  function showLoadError(msg) {
    const el = $("loadLog");
    el.textContent = msg;
    el.style.display = msg ? "inline" : "none";
  }

  async function loadTracks() {
    try {
      const res = await fetch("./genshin_tracks.json", { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error("配列形式ではありません。");
      tracks = data;
      return true;
    } catch (e) {
      showLoadError("読込エラー: " + e.message);
      return false;
    }
  }

  async function initAll() {
    showLoadError("");
    tracks = [];
    const ok = await loadTracks();
    if (ok && tracks.length > 0) {
      buildRanking();
    }
  }

  // ---- 検索文字列の正規化(大文字・小文字/全角・半角を区別しない) ----
  function normalizeForSearch(s) {
    if (!s) return "";
    // 全角英数字・記号 -> 半角
    let result = s.replace(/[\uFF01-\uFF5E]/g, ch =>
      String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
    );
    // 全角スペース -> 半角スペース
    result = result.replace(/\u3000/g, " ");
    return result.toLowerCase().trim();
  }

  // ---- アルバム名の表示整形 ----
  // 例: 「原神-輝く星々Vol. 5 (キャラクターテーマOriginal Soundtrack)」
  //     -> 「輝く星々Vol. 5」
  function formatAlbumName(album) {
    if (!album) return "";
    let s = album;
    // 先頭の「原神-」「原神 - 」(半角/全角スペースの有無を問わない)を削除
    s = s.replace(/^原神\s*-\s*/, "");
    // "Original ... Soundtrack" を含む括弧書きを括弧ごと削除(全角/半角括弧の両方に対応)
    s = s.replace(/[\(（][^)\)（）]*Original[^)\)（）]*Soundtrack[^)\)（）]*[\)）]/gi, "");
    s = s.trim();
    // Vol表記のゆれ(Vol 2 / Vol2 / Vol.2 、コンマの有無)を「タイトルVol.N」に統一
    const volMatch = s.match(/^(.*?)[,、]?\s*Vol\.?\s*(\d+)\s*$/i);
    if (volMatch) {
      const title = volMatch[1].trim().replace(/[,、]$/, "");
      s = `${title}Vol.${volMatch[2]}`;
    }
    return s.trim();
  }

  function formatDateJP(isoString) {
    const d = new Date(isoString);
    if (isNaN(d.getTime())) return null;
    return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
  }

  function buildRanking() {
    if (tracks.length === 0) return;

    const sorted = tracks.slice().sort((a, b) => (b.viewCount || 0) - (a.viewCount || 0));
    const total = sorted.length;
    rankedList = sorted.map((t, idx) => ({
      ...t,
      viewCount: t.viewCount || 0,
      rank: idx + 1,
      percentile: total > 0 ? ((idx + 1) / total) * 100 : 100,
    }));

    const createdAt = formatDateJP(tracks[0] && tracks[0].fetchedAt);
    $("rankPanelTitle").textContent = createdAt
      ? `再生数ランキング（${createdAt}時点）`
      : "再生数ランキング";

    $("searchPanel").style.display = "block";
    $("rankPanel").style.display = "block";

    renderAlbumCheckList();
    renderRankTable();
  }

  function renderAlbumCheckList() {
    const albums = Array.from(new Set(rankedList.map(t => t.album || "(不明)")));
    albums.sort((a, b) => formatAlbumName(a).localeCompare(formatAlbumName(b), "ja"));
    const container = $("albumCheckList");
    container.innerHTML = albums.map(album => `
      <label>
        <input type="checkbox" class="album-checkbox" value="${escapeHtml(album)}" />
        <span>${escapeHtml(formatAlbumName(album))}</span>
      </label>
    `).join("");
    container.querySelectorAll(".album-checkbox").forEach(cb => {
      cb.addEventListener("change", renderRankTable);
    });
  }

  function getSelectedAlbums() {
    return Array.from(document.querySelectorAll(".album-checkbox:checked")).map(cb => cb.value);
  }

  function renderRankTable() {
    const selectedAlbums = getSelectedAlbums();
    const minViewsRaw = $("minViewsInput").value;
    const topNRaw = $("topNInput").value;
    const minViews = minViewsRaw === "" ? null : parseInt(minViewsRaw, 10);
    const topN = topNRaw === "" ? null : parseInt(topNRaw, 10);

    let filtered = rankedList.filter(t => {
      const albumOk = selectedAlbums.length === 0 || selectedAlbums.includes(t.album || "(不明)");
      const viewsOk = minViews === null || isNaN(minViews) || t.viewCount >= minViews;
      return albumOk && viewsOk;
    });

    if (topN !== null && !isNaN(topN) && topN > 0) {
      filtered = filtered.slice(0, topN);
    }

    currentVisible = filtered;

    $("rankMeta").textContent = `全 ${rankedList.length} 曲中、条件に合致する ${filtered.length} 曲を表示しています。`;

    const tbody = $("rankBody");
    tbody.innerHTML = "";

    if (filtered.length === 0) {
      $("emptyState").style.display = "block";
      return;
    }
    $("emptyState").style.display = "none";

    for (const t of filtered) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank-num">${t.rank}</td>
        <td class="play-cell"><button class="play-btn" data-video="${t.videoId}" data-title="${escapeHtml(t.title)}">▶</button></td>
        <td class="title-cell">${escapeHtml(t.title)}</td>
        <td class="album-cell">${escapeHtml(formatAlbumName(t.album))}</td>
        <td class="views-cell">${t.viewCount.toLocaleString()}</td>
      `;
      tbody.appendChild(tr);
    }

    tbody.querySelectorAll(".play-btn").forEach(btn => {
      btn.addEventListener("click", () => playFromList(currentVisible, btn.dataset.video, btn.dataset.title));
    });

    applyPlayingIcons();
  }

  $("minViewsInput").addEventListener("input", renderRankTable);
  $("topNInput").addEventListener("input", renderRankTable);

  $("resetFilterBtn").addEventListener("click", () => {
    document.querySelectorAll(".album-checkbox:checked").forEach(cb => { cb.checked = false; });
    $("minViewsInput").value = "";
    $("topNInput").value = "20";
    renderRankTable();
  });

  // ---- 楽曲検索(曲名 AND アルバム名、複数候補は全件表示) ----
  function updateSearchResults() {
    const qSong = normalizeForSearch($("searchInput").value);
    const qAlbum = normalizeForSearch($("albumSearchInput").value);
    const resultBox = $("searchResult");

    if (!qSong && !qAlbum) { resultBox.innerHTML = ""; return; }

    const hits = rankedList.filter(t => {
      const titleOk = !qSong || normalizeForSearch(t.title).includes(qSong);
      const albumOk = !qAlbum || normalizeForSearch(formatAlbumName(t.album)).includes(qAlbum);
      return titleOk && albumOk;
    });

    if (hits.length === 0) {
      resultBox.innerHTML = `<div class="search-result">一致する楽曲が見つかりませんでした。</div>`;
      return;
    }

    resultBox.innerHTML = hits.map((hit, i) => `
      <div class="search-result" style="margin-top:${i === 0 ? "0" : "8px"};">
        <div style="display:flex; align-items:center; gap:8px;">
          <button class="play-btn search-play-btn" data-video="${hit.videoId}" data-title="${escapeHtml(hit.title)}" style="font-size:20px;">▶</button>
          <strong>${escapeHtml(hit.title)}</strong>（${escapeHtml(formatAlbumName(hit.album))}）
        </div>
        <div class="big">${hit.rank}位</div>
        <div>全 ${rankedList.length} 曲中 ・ 上位 ${hit.percentile.toFixed(1)}% ・ 再生回数 ${hit.viewCount.toLocaleString()}</div>
      </div>
    `).join("");

    resultBox.querySelectorAll(".search-play-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        playFromList(hits, e.currentTarget.dataset.video, e.currentTarget.dataset.title);
      });
    });

    applyPlayingIcons();
  }

  $("searchInput").addEventListener("input", updateSearchResults);
  $("albumSearchInput").addEventListener("input", updateSearchResults);

  // ---- 再生キュー・連続再生・前へ/次へ ----
  // YouTube IFrame Player API(JS側でのイベント検知)を使用する。
  // 過去の不具合対策:
  //   1) 非表示(display:none)のコンテナ内でプレーヤーを生成すると初期化に失敗する
  //      -> .activeクラスを付与し、明示的にreflowさせてから生成する
  //   2) 生成済みプレーヤーに loadVideoId() を呼ぶ方式は、onReady後でも
  //      一時的にメソッドが未整備で「loadVideoId is not a function」エラーになる
  //      場合があった -> loadVideoIdは使わず、曲を切り替えるたびにプレーヤー自体を
  //      破棄して作り直す方式(コンストラクタでvideoIdを直接指定、唯一確実に動く方式)に統一
  // shuffleMode/repeatModeは将来のシャッフル・リピート機能用のフックとして
  // 先に用意しておく(現時点ではUIなし、常にoff)。
  let playQueue = [];
  let queueIndex = -1;
  let baseList = []; // 現在のキューの元になった、シャッフルされていない一覧(元の並び順)
  let shuffleMode = false;      // 将来: シャッフル機能用
  let repeatMode = "off";       // 将来: "off" | "one" | "all"

  let ytApiReady = false;
  let ytPlayer = null;
  let pendingVideoId = null; // YouTube API自体の読込待ちで保留中の動画ID

  function onYouTubeIframeAPIReady() {
    ytApiReady = true;
    if (pendingVideoId) {
      const vid = pendingVideoId;
      pendingVideoId = null;
      createPlayer(vid);
    }
  }
  window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

  function createPlayer(videoId) {
    // 既存のプレーヤーがあれば破棄する(destroy()はiframe自体を削除するため、
    // マウント先のdivを毎回作り直す)
    if (ytPlayer && typeof ytPlayer.destroy === "function") {
      try { ytPlayer.destroy(); } catch (e) { /* 無視 */ }
    }
    ytPlayer = null;
    const host = $("ytPlayerHost");
    host.innerHTML = "";
    const mount = document.createElement("div");
    mount.id = "ytPlayerMount";
    host.appendChild(mount);

    $("seekBar").value = 0;

    ytPlayer = new YT.Player("ytPlayerMount", {
      height: "56",
      width: "56",
      videoId: videoId,
      playerVars: { autoplay: 1, rel: 0, controls: 0, disablekb: 1, modestbranding: 1 },
      events: {
        onStateChange: onPlayerStateChange,
      },
    });
  }

  // ---- シークバー ----
  // ユーザーがドラッグ操作中は、ポーリングによる自動更新で値が
  // 上書きされないようisSeekingフラグで抑止する。
  let isSeeking = false;

  function pollSeekBar() {
    if (!ytPlayer || isSeeking) return;
    if (typeof ytPlayer.getCurrentTime !== "function" || typeof ytPlayer.getDuration !== "function") return;
    try {
      const duration = ytPlayer.getDuration();
      const current = ytPlayer.getCurrentTime();
      if (duration > 0) {
        $("seekBar").max = duration;
        $("seekBar").value = current;
      }
    } catch (e) { /* プレーヤー破棄直後などは無視 */ }
  }
  setInterval(pollSeekBar, 500);

  $("seekBar").addEventListener("pointerdown", () => { isSeeking = true; });
  $("seekBar").addEventListener("change", () => {
    if (ytPlayer && typeof ytPlayer.seekTo === "function") {
      ytPlayer.seekTo(parseFloat($("seekBar").value), true);
    }
    isSeeking = false;
  });

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
      advanceQueue();
    }
  }

  function shuffleArray(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function playFromList(list, startVideoId, startTitle) {
    baseList = list.slice(); // 元の並び順を保持(シャッフルoff復帰用)

    const startIdx = list.findIndex(t => t.videoId === startVideoId);
    const startTrack = startIdx === -1
      ? { videoId: startVideoId, title: startTitle, album: "" }
      : list[startIdx];

    if (shuffleMode) {
      // シャッフル時: クリックした曲を先頭にし、残りをランダムな順に並べる
      const rest = startIdx === -1 ? [] : list.filter((_, i) => i !== startIdx);
      playQueue = [startTrack, ...shuffleArray(rest)];
      queueIndex = 0;
    } else {
      // 通常時: 表示されている順序をそのまま維持し、クリックした曲の位置から開始する
      playQueue = startIdx === -1 ? [startTrack] : list.slice();
      queueIndex = startIdx === -1 ? 0 : startIdx;
    }
    loadCurrentQueueTrack();
  }

  function updateNavButtonsState() {
    $("prevBtn").disabled = repeatMode === "off" && queueIndex <= 0;
    $("nextBtn").disabled = repeatMode === "off" && queueIndex >= playQueue.length - 1;
  }

  let currentPlayingVideoId = null;

  function applyPlayingIcons() {
    document.querySelectorAll(".play-btn").forEach(btn => {
      const row = btn.closest("tr") || btn.closest(".search-result");
      if (btn.dataset.video === currentPlayingVideoId) {
        btn.textContent = "♫";
        btn.classList.add("playing");
        if (row) row.classList.add("now-playing-row");
      } else {
        btn.textContent = "▶";
        btn.classList.remove("playing");
        if (row) row.classList.remove("now-playing-row");
      }
    });
  }

  function scrollToPlayingRow() {
    const playingBtn = document.querySelector(".play-btn.playing");
    if (playingBtn) {
      const row = playingBtn.closest("tr") || playingBtn.closest(".search-result");
      if (row) row.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }

  // 曲切替の瞬間だけ呼ぶ(アイコン更新+自動スクロール)
  function updatePlayingIndicators() {
    applyPlayingIcons();
    scrollToPlayingRow();
  }

  function loadCurrentQueueTrack() {
    const track = playQueue[queueIndex];
    if (!track) return;

    // 先にプレーヤー枠を表示し、明示的にreflowさせてサイズを確定させてから
    // プレーヤーを生成する(非表示状態での生成失敗を防ぐため)。
    const box = $("playerBox");
    box.classList.add("active");
    void box.offsetHeight; // 強制reflow

    $("nowPlayingLabel").textContent =
      `再生中: ${track.title}` + (playQueue.length > 1 ? ` (${queueIndex + 1}/${playQueue.length})` : "");
    updateNavButtonsState();

    currentPlayingVideoId = track.videoId;
    updatePlayingIndicators();

    if (!ytApiReady) {
      pendingVideoId = track.videoId;
      return;
    }
    createPlayer(track.videoId);
  }

  function advanceQueue() {
    if (playQueue.length === 0) return;
    if (repeatMode === "one") {
      loadCurrentQueueTrack(); // 同じ曲を再読込
      return;
    }
    if (queueIndex < playQueue.length - 1) {
      queueIndex++;
    } else if (repeatMode === "all") {
      queueIndex = 0;
    } else {
      return; // キュー終端。何もしない。
    }
    loadCurrentQueueTrack();
  }

  $("prevBtn").addEventListener("click", () => {
    if (queueIndex > 0) {
      queueIndex--;
      loadCurrentQueueTrack();
    } else if (repeatMode === "all" && playQueue.length > 0) {
      queueIndex = playQueue.length - 1;
      loadCurrentQueueTrack();
    }
  });

  $("nextBtn").addEventListener("click", () => advanceQueue());

  $("shuffleBtn").addEventListener("click", () => {
    shuffleMode = !shuffleMode;
    $("shuffleBtn").classList.toggle("on", shuffleMode);

    // 切り替えるたびに、現在再生中の曲を起点として再生履歴をリセットし、
    // 常にbaseList(全曲)を母集団として以降のキューを作り直す。
    // (過去にシャッフルon/offを繰り返しても母集団が狭まっていかないようにするため)
    if (playQueue.length > 0) {
      const currentTrack = playQueue[queueIndex];
      let rest;
      if (shuffleMode) {
        rest = shuffleArray(baseList.filter(t => t.videoId !== currentTrack.videoId));
      } else {
        // 元の並び順(baseList)で「現在再生中の曲」の直後から続くようにする
        const baseIdx = baseList.findIndex(t => t.videoId === currentTrack.videoId);
        rest = baseIdx === -1 ? [] : baseList.slice(baseIdx + 1);
      }
      playQueue = [currentTrack, ...rest];
      queueIndex = 0;
      updateNavButtonsState();
    }
  });

  $("repeatBtn").addEventListener("click", () => {
    repeatMode = repeatMode === "off" ? "all" : repeatMode === "all" ? "one" : "off";
    const icon = { off: "↻", one: "↻¹", all: "↻" }[repeatMode];
    const titleText = { off: "リピート: オフ", one: "リピート: 1曲", all: "リピート: 全曲" }[repeatMode];
    $("repeatBtn").textContent = icon;
    $("repeatBtn").title = titleText;
    $("repeatBtn").classList.toggle("on", repeatMode !== "off");
    updateNavButtonsState();
  });

  $("closePlayerBtn").addEventListener("click", () => {
    $("playerBox").classList.remove("active");
    if (ytPlayer && typeof ytPlayer.destroy === "function") {
      try { ytPlayer.destroy(); } catch (e) { /* 無視 */ }
    }
    ytPlayer = null;
    playQueue = [];
    queueIndex = -1;
    currentPlayingVideoId = null;
    updatePlayingIndicators();
    $("seekBar").value = 0;
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  initAll();
})();
</script>
</body>
</html>
